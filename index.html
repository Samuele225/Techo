<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Techo</title>
    <link rel="stylesheet" href="Techo.css">
    <meta name="theme-color" content="#007BFF">
<link rel="manifest" href="manifest.json">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>
<body>

<div class="calendar">
    <div class="header">
        <button id="prev">◀</button>
        <h2 id="monthYear"></h2>
        <button id="next">▶</button>
    </div>

    <div class="days">
        <div>Lun</div>
        <div>Mar</div>
        <div>Mer</div>
        <div>Gio</div>
        <div>Ven</div>
        <div>Sab</div>
        <div>Dom</div>
    </div>

    <div id="dates" class="dates"></div>
</div>

<script src="Techo.js"></script>
</body>
</html>
