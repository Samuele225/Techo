<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techo</title>
<link rel="stylesheet" href="Techo.css">
<script src="Techo.js" defer></script>

</head>

<body>

<header>
    <button onclick="changeMonth(-1)">⬅</button>
    <div id="month"></div>
    <button onclick="changeMonth(1)">➡</button>
</header>

<div id="daysContainer"></div>

<div id="tasks">
    <h3>Attività giornaliere</h3>

    <button onclick="clearMemory()" style="
    margin-top: 10px;
    background: rgb(190, 18, 18);
    color: white;
    border: none;
    padding: 10px;
    border-radius: 8px;
">
    Elimina memoria 🗑
</button>

    <div class="controls">
        <input id="taskInput" placeholder="Aggiungi attività...">
        <button class="addBtn" onclick="addTask()">+</button>
    </div>

    <div id="taskList"></div>
</div>

</body>
</html>
